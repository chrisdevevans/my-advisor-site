# CloudCannon configuration — Hargrove Wealth Advisory
# Docs: https://cloudcannon.com/documentation/developer-reference/configuration-file/collections_config/

source: ""

paths:
  uploads: public/uploads
  static: public

collections_config:
  # ------------------------------------------------------------------
  # PAGES — one JSON data file per marketing page.
  # Each file has a `_path` field that tells CloudCannon which live URL
  # to open in the Visual Editor (and to use for card previews).
  # ------------------------------------------------------------------
  pages:
    path: src/data/pages
    glob:
      - "**/*.json"
    output: false
    url: "{_path}"
    icon: web
    name: Pages
    singular_name: Page
    description: Marketing pages of the site. Each file is the structured content of one page; the page templates render this data automatically.
    disable_add: true
    disable_add_folder: true
    disable_file_actions: true
    _enabled_editors:
      - visual
      - data
    preview:
      text:
        - key: _pageName
        - key: meta.title
      subtext:
        - key: meta.description
      icon:
        - web
    _inputs:
      _path:
        type: text
        comment: Live URL of this page on the site. Do not change.
        options:
          empty_type: string
      _pageName:
        type: text
        comment: Display name for this page in the CloudCannon dashboard. Does not appear on the site.
      meta:
        type: object
        comment: SEO title and description for this page.
      hero:
        type: object
        comment: The page hero (eyebrow, heading, lede, CTAs, trust items).
      cta:
        type: object
        comment: Bottom-of-page conversion banner.
      servicesPreview:
        type: object
        comment: The three-card services preview section on the home page.
      aboutTeaser:
        type: object
        comment: The split "about the firm" section on the home page.
      testimonials:
        type: object
        comment: Client testimonials block on the home page.
      story:
        type: object
        comment: The "Our Story" prose section on the About page.
      values:
        type: object
        comment: Four firm values shown on the About page.
      timeline:
        type: object
        comment: Milestone timeline on the About page.
      teamPreview:
        type: object
        comment: Three team members previewed on the About page.
      services:
        type: array
        comment: Service cards on the Services page. Reorder, add, or remove freely.
      process:
        type: object
        comment: Four-step process shown on the Services page.
      fees:
        type: object
        comment: Fee structure section with AUM tiers.
      members:
        type: array
        comment: Full team members shown on the Team page.
      info:
        type: object
        comment: Contact info column labels on the Contact page.
      form:
        type: object
        comment: Contact form labels and post-submit message.
      calendly:
        type: object
        comment: Optional "Schedule on Calendly" CTA below the contact form.
      intro:
        type: textarea
        comment: Opening paragraph on the Privacy page.
        options:
          rows: 4
      sections:
        type: array
        comment: Privacy-policy sections. Each entry has a heading and a body (markdown allowed for bold, lists, links).

  # ------------------------------------------------------------------
  # SITE SETTINGS — brand, nav, footer, contact, SEO. Shared chrome.
  # Single file (site.json) — surfaces under the "Site" sidebar group.
  # ------------------------------------------------------------------
  site:
    path: src/data
    glob:
      - "site.json"
    output: false
    disable_url: true
    icon: settings
    name: Site Settings
    singular_name: Site Settings
    description: Brand name, contact details, navigation, footer links, and SEO defaults. Changes here apply to every page.
    disable_add: true
    disable_add_folder: true
    disable_file_actions: true
    _enabled_editors:
      - data
    preview:
      text:
        - Site Settings
      subtext:
        - key: brand.title
        - Brand, contact, navigation, footer & SEO
      icon:
        - settings
    _inputs:
      brand:
        type: object
        comment: Logo wordmark and footer tagline.
      contact:
        type: object
        comment: Phone, email, address, and business hours.
      nav:
        type: object
        comment: Top navigation links and CTA button.
      footer:
        type: object
        comment: Footer column headings, link sets, copyright, and disclaimer.
      seo:
        type: object
        comment: Default SEO values when a page does not set its own.

  # ------------------------------------------------------------------
  # BLOG POSTS — Astro content collection.
  # ------------------------------------------------------------------
  blog:
    path: src/content/blog
    glob:
      - "**/*.md"
    output: true
    url: "/blog/[slug]/"
    icon: article
    name: Blog Posts
    singular_name: Blog Post
    description: Articles published to /blog/. Each file becomes a post page.
    new_preview_url: /blog/
    _enabled_editors:
      - visual
      - content
    add_options:
      - name: New Blog Post
        schema: default
        icon: article
    schemas:
      default:
        name: New Blog Post
        path: .cloudcannon/schemas/blog-post.md
        icon: article
        remove_extra_inputs: false
    create:
      path: "[relative_base_path]/{title|slugify|lowercase}.md"
    _inputs:
      title:
        type: text
        comment: The post title — used as the page heading and in metadata.
      date:
        type: date
        comment: Publication date. Sorts the blog index newest first.
      author:
        type: text
        comment: Author's display name.
      excerpt:
        type: textarea
        options:
          rows: 3
        comment: Short summary shown on the blog index card and in social previews.
      image:
        type: image
        comment: Optional hero image.
        options:
          paths:
            uploads: public/uploads
          resize_style: contain
          width: 1920
          height: 1080
      tags:
        type: multiselect
        comment: Topics for filtering. Pick any that apply.
        options:
          values:
            - Wealth Management
            - Retirement
            - Tax Planning
            - Investment
            - Planning
            - Business
    _editables:
      content:
        format: p h2 h3 h4
        bold: true
        italic: true
        link: true
        bulletedlist: true
        numberedlist: true
        blockquote: true
        code: true
        horizontalrule: true
        undo: true
        redo: true
        removeformat: true

collection_groups:
  - heading: Content
    collections:
      - pages
      - blog
  - heading: Site
    collections:
      - site
